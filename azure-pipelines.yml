trigger:
  branches:
    include:
      - master
      - main

pr:
  autoCancel: true
  branches:
    include:
      - master
      - main

pool:
  vmImage: ubuntu-latest

variables:
  BuildConfiguration: Release
  DotNetVersion: 8.0.x
  NodeVersion: 22.x
  Solution: $(Build.SourcesDirectory)/KalshiIntegrationEventPublisher.sln
  DotNetTestResultsDirectory: $(Agent.TempDirectory)/dotnet-test-results
  UnitCoverageSummaryFile: $(Build.SourcesDirectory)/tests/Kalshi.Integration.UnitTests/TestResults/Coverage/coverage.cobertura.xml
  UnitCoverageArtifactDirectory: $(Build.SourcesDirectory)/tests/Kalshi.Integration.UnitTests/TestResults/Coverage

stages:
  - stage: validate
    displayName: Validate build and tests
    jobs:
      - job: build_test
        displayName: Build, test, and publish coverage
        steps:
          - checkout: self
            clean: true

          - task: UseDotNet@2
            displayName: Install .NET SDK $(DotNetVersion)
            inputs:
              packageType: sdk
              version: $(DotNetVersion)

          - task: NodeTool@0
            displayName: Install Node.js $(NodeVersion)
            inputs:
              versionSpec: $(NodeVersion)

          - script: >-
              dotnet restore "$(Solution)"
              --verbosity minimal
              -p:NuGetAudit=true
              -p:NuGetAuditMode=all
              -p:NuGetAuditLevel=high
            displayName: Restore .NET solution and audit NuGet dependencies

          - script: dotnet format "$(Solution)" --verify-no-changes --no-restore
            displayName: Verify .NET formatting

          - script: dotnet build "$(Solution)" --configuration $(BuildConfiguration) --no-restore -p:ContinuousIntegrationBuild=true
            displayName: Build .NET solution with analyzer enforcement

          - script: >-
              dotnet test "$(Solution)"
              --configuration $(BuildConfiguration)
              --no-build
              --logger "trx;LogFileName=kalshi-integration.trx"
              --results-directory "$(DotNetTestResultsDirectory)"
            displayName: Run .NET tests

          - task: PublishTestResults@2
            displayName: Publish .NET test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: $(DotNetTestResultsDirectory)/**/*.trx
              failTaskOnFailedTests: true
              testRunTitle: Kalshi Integration Event Publisher .NET Tests

          - script: node --test
            displayName: Run Node gateway tests
            workingDirectory: node-gateway

          - task: PublishCodeCoverageResults@1
            displayName: Publish unit test coverage
            condition: succeededOrFailed()
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: $(UnitCoverageSummaryFile)
              pathToSources: $(Build.SourcesDirectory)
              failIfCoverageEmpty: true

          - task: PublishPipelineArtifact@1
            displayName: Publish unit coverage artifact
            condition: succeededOrFailed()
            inputs:
              targetPath: $(UnitCoverageArtifactDirectory)
              artifact: unit-test-coverage
              publishLocation: pipeline
